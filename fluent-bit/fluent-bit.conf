[SERVICE]
    Flush                     1
    Log_Level                 info
    # Buffer en disco: aquí viven los chunks pendientes y los offsets de lectura.
    storage.path              /var/log/flb-storage/
    storage.sync              normal
    storage.backlog.mem_limit 20M

# ---------------- NFV ----------------
# Lee el fichero que escribe APISIX (file-logger) y lo envía al topic logs-nfv.
[INPUT]
    Name              tail
    Tag               nfv
    # glob: cada worker de APISIX escribe su propio fichero (nfv-0.log, nfv-1.log...)
    Path              /var/log/apisix/nfv-*.log
    DB                /var/log/flb-storage/tail-nfv.db
    storage.type      filesystem
    Refresh_Interval  5

[OUTPUT]
    Name                      kafka
    Match                     nfv
    Brokers                   kafka:9092
    Topics                    logs-nfv
    # 'raw' + Raw_Log_Key reenvía la línea TAL CUAL la escribió APISIX (sin reformatear),
    # así el mensaje en Kafka es idéntico al que producía el kafka-logger.
    Format                    raw
    Raw_Log_Key               log
    # Límite del buffer en disco para este destino. Si se llena (caída muy larga),
    # Fluent Bit descarta los chunks más antiguos (backpressure).
    storage.total_limit_size  256M

# ---------------- REP ----------------
[INPUT]
    Name              tail
    Tag               rmep
    # glob: un fichero por worker (rmep-0.log, rmep-1.log...)
    Path              /var/log/apisix/rmep-*.log
    DB                /var/log/flb-storage/tail-rmep.db
    storage.type      filesystem
    Refresh_Interval  5

[OUTPUT]
    Name                      kafka
    Match                     rmep
    Brokers                   kafka:9092
    Topics                    logs-rmep
    Format                    raw
    Raw_Log_Key               log
    storage.total_limit_size  256M
