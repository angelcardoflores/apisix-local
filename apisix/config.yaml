deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen: 9080

plugins:
  - real-ip
  - ai
  - client-control
  - proxy-control
  - request-id
  - zipkin
  - ext-plugin-pre-req
  - fault-injection
  - mocking
  - serverless-pre-function
  - cors
  - ip-restriction
  - ua-restriction
  - referer-restriction
  - csrf
  - uri-blocker
  - request-validation
  - openid-connect
  - cas-auth
  - authz-casbin
  - authz-casdoor
  - wolf-rbac
  - ldap-auth
  - hmac-auth
  - basic-auth
  - jwt-auth
  - key-auth
  - consumer-restriction
  - forward-auth
  - opa
  - authz-keycloak
  - proxy-cache
  - body-transformer
  - proxy-mirror
  - proxy-rewrite
  - workflow
  - api-breaker
  - limit-conn
  - limit-count
  - limit-req
  - gzip
  - traffic-split
  - redirect
  - response-rewrite
  - kafka-logger
  - http-logger
  - elasticsearch-logger
  - tcp-logger
  - udp-logger
  - rocketmq-logger
  - syslog
  - skywalking-logger
  - google-cloud-logging
  - splunk-hec-logging
  - file-logger
  - loggly
  - datadog
  - opentelemetry
  - prometheus
  - node-status
  - ext-plugin-post-req
  - ext-plugin-post-resp
  - extract-soe
  - validate-conditions
  - nfv-token-rewrite
  - rep-token-rewrite
  - file-logger-pw

nginx_config:
  # Expone estas variables del entorno a los workers de nginx (directivas `env`),
  # para que los plugins puedan leerlas con os.getenv().
  envs:
    - COF_CLIENT_ID
    - COF_CLIENT_SECRET
    - NFV_SCOPE
    - REP_SCOPE
    - REP_APPLICATION