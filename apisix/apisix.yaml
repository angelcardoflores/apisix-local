services:

  - id: nfv-token-service
    upstream:
      nodes:
        "prepronfvn.nodofarma.es:443": 1
      scheme: https
      pass_host: rewrite
      upstream_host: "prepronfvn.nodofarma.es"
      tls:
        verify: true
    plugins:
      extract-soe:
        param_names: ["concof_pharmacy", "soe", "idFarmacia", "pharmacy"]
      validate-conditions:
        validation_uri: "http://farmameterms:8001/check-condiciones"
        timeout: 1000
        cache_ttl : 300
      nfv-token-rewrite:
        scope: "NodoFarmaVerificacionConCofScope"
      kafka-logger:
        brokers:
          - host: "kafka"
            port: 9092
        kafka_topic: "logs-nfv-token"
        include_req_body: true
        include_resp_body: true
        # OPTIMIZACIÓN: Envío asíncrono y eficiente para no bloquear las peticiones
        producer_type: async
        batch_max_size: 50
        buffer_duration: 5
        meta_refresh_interval: 30
        timeout: 3

  - id: nfv-service
    upstream:
      nodes:
        "prepronfvn.nodofarma.es:443": 1
      scheme: https
      pass_host: rewrite
      upstream_host: "prepronfvn.nodofarma.es"
      tls:
        verify: true
    plugins:
      extract-soe:
        param_names: ["soe", "idFarmacia", "pharmacy", "concof_pharmacy"]
      validate-conditions:
        validation_uri: "http://farmameterms:8001/check-condiciones"
        timeout: 1000
        cache_ttl : 300
      kafka-logger:
        brokers:
          - host: "kafka"
            port: 9092
        kafka_topic: "logs-nfv"
        include_req_body: true
        include_resp_body: true
        # OPTIMIZACIÓN: Envío asíncrono y eficiente para no bloquear las peticiones
        producer_type: async
        batch_max_size: 50
        buffer_duration: 5
        meta_refresh_interval: 30
        timeout: 3

routes:

  - id: nfv-token
    uri: /verify/3.0/oauth
    service_id: nfv-token-service
    priority: 10  # Mayor prioridad por ser un endpoint exacto y crítico

  - id: nfv-verify
    uri: /verify/*
    service_id: nfv-service
    priority: 1   # Menor prioridad para actuar como catch-all de /verify/

  - id: nfv-operaciones
    uri: /nodofarmaverificacion/*
    service_id: nfv-service
    priority: 1

#END