services:

  - id: nfv-token-service
    upstream:
      nodes:
        "prepronfvn.nodofarma.es:443": 1
      scheme: https
      pass_host: rewrite
      upstream_host: "prepronfvn.nodofarma.es"
      tls:
        verify: true
    plugins:
      extract-soe:
        param_names: ["client_id", "concof_pharmacy", "soe", "idFarmacia", "pharmacy"]
      validate-conditions:
        validation_uri: "http://farmameterms:8001/check-condiciones"
      nfv-token-rewrite:
        #client_id: "$ENV://COF_CLIENT_ID"
        #client_secret: "$ENV://COF_CLIENT_SECRET"
        scope: "NodoFarmaVerificacionConCofScope"
      kafka-logger:
        brokers:
          - host: "kafka"
            port: 9092
        kafka_topic: "logs-nfv-token"
        include_req_body: true
        include_resp_body: true
        batch_max_size: 1
        meta_refresh_interval: 1
        producer_type: sync
        timeout: 3

  - id: nfv-service
    upstream:
      nodes:
        "prepronfvn.nodofarma.es:443": 1
      scheme: https
      pass_host: rewrite
      upstream_host: "prepronfvn.nodofarma.es"
      tls:
        verify: true
    plugins:
      extract-soe:
        param_names: ["soe", "idFarmacia", "pharmacy", "concof_pharmacy"]
      validate-conditions:
        validation_uri: "http://farmameterms:8001/check-condiciones"
      kafka-logger:
        brokers:
          - host: "kafka"
            port: 9092
        kafka_topic: "logs-nfv"
        include_req_body: true
        include_resp_body: true
        batch_max_size: 1
        meta_refresh_interval: 1
        producer_type: sync
        timeout: 3

routes:

  - id: nfv-token
    uri: /verify/3.0/oauth
    service_id: nfv-token-service

  - id: nfv-verify
    uri: /verify/*
    service_id: nfv-service

  - id: nfv-operaciones
    uri: /nodofarmaverificacion/*
    service_id: nfv-service

#END