services:

  apisix:
    build:
      context: ./apisix
    environment:
      - COF_CLIENT_ID=${COF_CLIENT_ID}
      - COF_CLIENT_SECRET=${COF_CLIENT_SECRET}
      - NFV_SCOPE=${NFV_SCOPE}
      - REP_SCOPE=${REP_SCOPE}
      - REP_APPLICATION=${REP_APPLICATION}
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
      - ./apisix/plugins/extract-soe.lua:/usr/local/apisix/apisix/plugins/extract-soe.lua
      - ./apisix/plugins/nfv-token-rewrite.lua:/usr/local/apisix/apisix/plugins/nfv-token-rewrite.lua
      - ./apisix/plugins/validate-conditions.lua:/usr/local/apisix/apisix/plugins/validate-conditions.lua
      - ./apisix/plugins/rep-token-rewrite.lua:/usr/local/apisix/apisix/plugins/rep-token-rewrite.lua
      - ./apisix/plugins/token_rewrite_util.lua:/usr/local/apisix/apisix/plugins/token_rewrite_util.lua
      - ./apisix/plugins/file-logger-pw.lua:/usr/local/apisix/apisix/plugins/file-logger-pw.lua
      # Logs de APISIX (incluidos nfv.log / rmep.log del file-logger), compartidos con Fluent Bit
      - apisix-logs:/usr/local/apisix/logs
    ports:
      - "9080:9080"
    depends_on:
      - farmameterms
      - kafka

  farmameterms:
    build:
      context: ./farmameterms
      args:
        REPO_URL: ${REPO_URL}
        BRANCH: ${BRANCH}
        GIT_TOKEN: ${GIT_TOKEN}
    ports:
      - "8001:8001"

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # La hora la pone el broker al escribir (evita timestamps epoch/1970 si el
      # productor no envía marca de tiempo). Sirve incluso para topics auto-creados.
      KAFKA_LOG_MESSAGE_TIMESTAMP_TYPE: LogAppendTime

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c", "echo 'Esperando a Kafka...' && sleep 20 && /opt/kafka/bin/kafka-topics.sh --create --topic logs-nfv --partitions 2 --replication-factor 1 --bootstrap-server kafka:9092 --if-not-exists --config message.timestamp.type=LogAppendTime && /opt/kafka/bin/kafka-topics.sh --create --topic logs-rmep --partitions 2 --replication-factor 1 --bootstrap-server kafka:9092 --if-not-exists --config message.timestamp.type=LogAppendTime && echo 'Topics creados'" ]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # Shipper: lee los ficheros de log de APISIX y los publica en Kafka con buffer en
  # disco. Si Kafka cae, acumula en disco y se pone al día al volver (sin perder datos).
  fluent-bit:
    image: fluent/fluent-bit:latest   # pin a una versión fija para producción
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - apisix-logs:/var/log/apisix:ro
      - flb-storage:/var/log/flb-storage
    depends_on:
      - kafka
      - apisix
    restart: unless-stopped

  # Rotación de los ficheros de log de APISIX (a 100 MB, conserva 3 comprimidos).
  # Comparte el volumen de logs y el PID namespace de apisix para mandarle la señal
  # de reopen (SIGUSR1) tras rotar, sin perder líneas.
  log-rotator:
    build: ./logrotate
    command: sh -c "while true; do logrotate -s /var/lib/logrotate/status /etc/logrotate.d/apisix-logs; sleep 60; done"
    volumes:
      - apisix-logs:/usr/local/apisix/logs
    pid: "service:apisix"
    depends_on:
      - apisix
    restart: unless-stopped

volumes:
  apisix-logs:
  flb-storage:
