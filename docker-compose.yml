services:

  apisix:
    build:
      context: ./apisix
    environment:
      - COF_CLIENT_ID=${COF_CLIENT_ID}
      - COF_CLIENT_SECRET=${COF_CLIENT_SECRET}
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
      - ./apisix/plugins/extract-soe.lua:/usr/local/apisix/apisix/plugins/extract-soe.lua
      - ./apisix/plugins/nfv-token-rewrite.lua:/usr/local/apisix/apisix/plugins/nfv-token-rewrite.lua
      - ./apisix/plugins/validate-conditions.lua:/usr/local/apisix/apisix/plugins/validate-conditions.lua
    ports:
      - "9080:9080"
    depends_on:
      - farmameterms
      - kafka

  farmameterms:
    build:
      context: ./farmameterms
      args:
        REPO_URL: ${REPO_URL}
        BRANCH: ${BRANCH}
        GIT_TOKEN: ${GIT_TOKEN}
    ports:
      - "8001:8001"

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c", "echo 'Esperando a Kafka...' && sleep 20 && /opt/kafka/bin/kafka-topics.sh --create --topic logs-nfv --partitions 2 --replication-factor 1 --bootstrap-server kafka:9092 --if-not-exists --config message.timestamp.type=LogAppendTime && echo 'Topic creado'" ]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
