# Rotacion de los logs que APISIX (file-logger-pw) escribe por worker.
# Kafka es el almacen durable; estos ficheros son solo un relay -> retencion minima.
# Solo nuestros ficheros (no el access/error log de APISIX).
# IMPORTANTE: logrotate NO admite comentarios en la misma linea que una directiva.
/usr/local/apisix/logs/nfv-*.log /usr/local/apisix/logs/rmep-*.log {
    # rota cuando el fichero supera 100 MB
    size 100M
    # conserva 3 rotados comprimidos
    rotate 3
    compress
    # el .1 queda sin comprimir hasta la siguiente rotacion, para que Fluent Bit lo termine de leer
    delaycompress
    missingok
    notifempty
    # no crea el fichero nuevo: lo recrea APISIX al reabrir (worker, en el dir 777)
    nocreate
    sharedscripts
    postrotate
        # APISIX reabre sus ficheros al recibir SIGUSR1 (reopen estandar de nginx); reabre uno por worker, sin perdida
        [ -f /usr/local/apisix/logs/nginx.pid ] && kill -USR1 "$(cat /usr/local/apisix/logs/nginx.pid)" || true
    endscript
}
